<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <script type="module" src="script.js"></script>
    <link rel="stylesheet" href="styles.css">
    <script src="https://kit.fontawesome.com/cfbd2d9ddc.js" crossorigin="anonymous"></script>
</head>
<body>
    <div class="container">
        <!-- header -->
        <header>
            <div class="header-top-wrap">
                <!-- <button id="menu-toggle">menutoggle</button> -->
                <div class="header-search-bar">
                    <input type="text" placeholder="search">
                </div>
                <div class="header-top-right">
                    <button class="header-top-btn" id="theme-toggle">
                        <svg class="header-top-icon"><use href="/svg/feather-sprite.svg#moon"></svg>
                    </button>
                    <button class="header-top-btn" id="notifications">
                        <svg class="header-top-icon"><use href="/svg/feather-sprite.svg#bell"></svg>
                        <span class="notification-badge">3</span>
                    </button>
                    <div class="user-info">
                        <img src="example.jpg" class="avatar">  <!-- add alt -->
                        <p>User Name</p>
                    </div>
                </div>
            </div>
            <div class="header-bottom-wrap">
                <h2>Welcome username</h2>
                <div class="header-bottom-right">
                    <button class="header-bottom-btn"><svg class="header-bottom-icon"><use href="/svg/feather-sprite.svg#share-2"></svg>Share</button>
                    <button class="header-bottom-btn"><svg class="header-bottom-icon"><use href="/svg/feather-sprite.svg#upload"></svg>Export</button>
                    <button class="header-bottom-btn"><svg class="header-bottom-icon"><use href="/svg/feather-sprite.svg#plus"></svg>Add new</button>
                </div>
            </div>
        </header>
        <!-- sidebar -->
        <nav>
            <div class="logo">
                logo
            </div>
            <div class="nav-menu">
                <ul class="links">
                    <li><a href="#"><svg class="nav-icon"><use href="/svg/feather-sprite.svg#grid"></svg>dashboard</a></li>
                    <li><a href="#"><svg class="nav-icon"><use href="/svg/feather-sprite.svg#list"></svg>tasks</a></li>
                    <li><a href="#"><svg class="nav-icon"><use href="/svg/feather-sprite.svg#folder"></svg>projects</a></li>
                    <li><a href="#"><svg class="nav-icon"><use href="/svg/feather-sprite.svg#calendar"></svg>calendar</a></li>
                    <li><a href="#"><svg class="nav-icon"><use href="/svg/feather-sprite.svg#users"></svg>teams</a></li> 
                    <li><a href="#"><svg class="nav-icon"><use href="/svg/feather-sprite.svg#message-circle"></svg>messages</a></li>
                    <li><a href="#"><svg class="nav-icon"><use href="/svg/feather-sprite.svg#edit"></svg>notes</a></li> 
                    <li><a href="#"><svg class="nav-icon"><use href="/svg/feather-sprite.svg#file-text"></svg>reports</a></li>                      
                </ul>
                <hr>
                <ul class="links">
                    <li><a href="#"><svg class="nav-icon"><use href="/svg/feather-sprite.svg#settings"></svg>settings</a></li>
                    <li><a href="#"><svg class="nav-icon"><use href="/svg/feather-sprite.svg#help-circle"></svg>support</a></li>                     
                </ul>
            </div>
        </nav>
        <!-- main -->
         <main>
            main
         </main>
         <!-- aside -->
         <aside>
            aside
         </aside>
    </div>
</body>
